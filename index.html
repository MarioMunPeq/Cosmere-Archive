<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="Interactive visual encyclopedia of the Cosmere universe by Brandon Sanderson. Explore planets, characters, magic systems, and more." />
    <meta name="author" content="Cosmere Archive" />
    <title>Cosmere Archive</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('cosmere-theme');
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
